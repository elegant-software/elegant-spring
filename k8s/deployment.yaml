apiVersion: apps/v1
kind: Deployment
metadata:
  name: springarchview
  labels:
    app: springarchview
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springarchview
  template:
    metadata:
      labels:
        app: springarchview
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: springarchview
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: STATIC_DIR
              value: "/app/public"
          readinessProbe:
            httpGet:
              path: /api/graph
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/graph
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: springarchview
spec:
  selector:
    app: springarchview
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springarchview
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - springarchview.elegantsoftware.de
      secretName: ngdiagram-elegantsoftware-de-tls
  rules:
    - host: springarchview.elegantsoftware.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: springarchview
                port:
                  number: 80
