apiVersion: apps/v1
kind: Deployment
metadata:
  name: springarchview-mcp
  labels:
    app: springarchview-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springarchview-mcp
  template:
    metadata:
      labels:
        app: springarchview-mcp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: springarchview-mcp
          image: ${MCP_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
          env:
            - name: PORT
              value: "3100"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: springarchview-mcp
spec:
  selector:
    app: springarchview-mcp
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3100

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springarchview-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - springarchview-mcp.elegantsoftware.de
      secretName: springarchview-mcp-elegantsoftware-de-tls
  rules:
    - host: springarchview-mcp.elegantsoftware.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: springarchview-mcp
                port:
                  number: 80
