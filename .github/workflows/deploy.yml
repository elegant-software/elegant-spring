name: Deploy springarchview

on:
  workflow_dispatch:
    inputs:
      image_reference:
        description: 'Frontend image reference (e.g. ghcr.io/org/repo/frontend:sha)'
        required: false
      mcp_image_reference:
        description: 'MCP server image reference (e.g. ghcr.io/org/repo/mcp-server:sha)'
        required: false
      kube_namespace:
        description: 'Kubernetes namespace'
        required: true
        default: blitzpay-staging
  workflow_call:
    inputs:
      image_reference:
        type: string
        required: true
      mcp_image_reference:
        type: string
        required: true
      kube_namespace:
        type: string
        required: false
    secrets:
      K8S_SERVER:
        required: false
      K8S_CA_CERT:
        required: false
      K8S_TOKEN:
        required: false

jobs:
  apply:
    runs-on: self-hosted
    env:
      KUBE_NAMESPACE: ${{ inputs.kube_namespace || github.event.inputs.kube_namespace || secrets.KUBE_NAMESPACE }}
      IMAGE_REFERENCE: ${{ inputs.image_reference || github.event.inputs.image_reference || format('ghcr.io/{0}/frontend:latest', github.repository) }}
      MCP_IMAGE_REFERENCE: ${{ inputs.mcp_image_reference || github.event.inputs.mcp_image_reference || format('ghcr.io/{0}/mcp-server:latest', github.repository) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          K8S_SERVER: ${{ secrets.K8S_SERVER }}
          K8S_CA_CERT: ${{ secrets.K8S_CA_CERT }}
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
        run: |
          missing=()
          [ -z "$K8S_SERVER" ]  && missing+=("K8S_SERVER")
          [ -z "$K8S_CA_CERT" ] && missing+=("K8S_CA_CERT")
          [ -z "$K8S_TOKEN" ]   && missing+=("K8S_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$K8S_CA_CERT" | base64 -d > "$HOME/.kube/ca.crt"

          kubectl config set-cluster deploy-cluster \
            --server="$K8S_SERVER" \
            --certificate-authority="$HOME/.kube/ca.crt" \
            --embed-certs=true

          kubectl config set-credentials deploy-user \
            --token="$K8S_TOKEN"

          kubectl config set-context deploy-context \
            --cluster=deploy-cluster \
            --user=deploy-user

          kubectl config use-context deploy-context

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Render Kubernetes manifests
        run: |
          sed "s|\${IMAGE}|${{ env.IMAGE_REFERENCE }}|g" k8s/deployment.yaml > /tmp/deployment.yaml
          sed "s|\${MCP_IMAGE}|${{ env.MCP_IMAGE_REFERENCE }}|g" k8s/mcp-server.yaml > /tmp/mcp-server.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f /tmp/deployment.yaml -n "$KUBE_NAMESPACE"
          kubectl apply -f /tmp/mcp-server.yaml -n "$KUBE_NAMESPACE"
